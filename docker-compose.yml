services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      CACHE_REDIS_URI: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/${REDIS_DB:-0}
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - default
      - easypanel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - default

volumes:
  evolution_instances:
  evolution_redis_data:

networks:
  easypanel:
    external: true
    name: ${EASYPANEL_PROJECT_NETWORK:-easypanel}
