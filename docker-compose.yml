services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    pull_policy: always
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      DATABASE_ENABLED: ${DATABASE_ENABLED:-true}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
      CACHE_REDIS_URI: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/${REDIS_DB:-0}
      # Baileys QR — sync with whatsappWebVersion from GET /
      CONFIG_SESSION_PHONE_VERSION: ${CONFIG_SESSION_PHONE_VERSION:-2.3000.1043159177}
      CONFIG_SESSION_PHONE_CLIENT: ${CONFIG_SESSION_PHONE_CLIENT:-Evolution API}
      CONFIG_SESSION_PHONE_NAME: ${CONFIG_SESSION_PHONE_NAME:-Chrome}
      QRCODE_LIMIT: ${QRCODE_LIMIT:-30}
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      default: {}
      easypanel:
        aliases:
          - evolution-api
          - sass-botflow-evolution-api
          - sass-botflow_evolution-api
          - sass-botflow_botflow-evolution

  redis:
    image: redis:7-alpine
    pull_policy: always
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - default

volumes:
  evolution_instances:
  evolution_redis_data:

networks:
  easypanel:
    external: true
    name: ${EASYPANEL_PROJECT_NETWORK:-easypanel}
