services:
  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: ${EVOLUTION_CONTAINER_NAME:-evolution-api}
    hostname: ${EVOLUTION_HOSTNAME:-evolution-api}
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      CACHE_REDIS_URI: redis://${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/${REDIS_DB:-0}
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - default
      - evolution-net
      - easypanel-project

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-evolution-redis}
    hostname: ${REDIS_HOSTNAME:-redis}
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      evolution-net:
        aliases:
          - ${REDIS_HOST:-redis}

volumes:
  evolution_instances:
  evolution_redis_data:

networks:
  evolution-net:
    name: ${DOCKER_NETWORK_NAME:-evolution-net}
  easypanel-project:
    external: true
    name: ${EASYPANEL_PROJECT_NETWORK:-easypanel}
